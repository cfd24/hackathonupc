<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SILO SIM | Algorithm Comparison</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&family=JetBrains+Mono&display=swap" rel="stylesheet">
</head>
<body class="dark-theme">
    <div class="app-container">
        <header class="app-header">
            <div class="brand">
                <h1 class="logo">SILO <span class="accent">COMPARE</span></h1>
            </div>
            <div class="header-controls">
                <div class="control-group">
                    <label>Starting Fullness</label>
                    <select id="fullness-selector">
                        <option value="empty">Empty (0%)</option>
                        <option value="low">Low (11.8%)</option>
                        <option value="medium">Medium (50%)</option>
                        <option value="high">High (75%)</option>
                    </select>
                </div>
                <button id="btn-play" class="btn-primary">RUN COMPARISON</button>
            </div>
        </header>

        <div class="comparison-layout">
            <!-- Left: Simple Algorithm -->
            <section class="algo-column" id="column-simple">
                <div class="algo-header">
                    <h2>Simple Algorithm</h2>
                    <div class="metrics-grid">
                        <div class="metric">
                            <label>Time</label>
                            <span id="simple-time">—</span>
                        </div>
                        <div class="metric">
                            <label>P/h</label>
                            <span id="simple-pallets-hour">—</span>
                        </div>
                        <div class="metric">
                            <label>Eff</label>
                            <span id="simple-efficiency">—</span>
                        </div>
                        <div class="metric">
                            <label>Occ</label>
                            <span id="simple-occupancy">—</span>
                        </div>
                    </div>
                </div>
                <div class="aisle-grid-mini">
                    <div class="aisle-panel-mini"><canvas id="simple-aisle-1"></canvas></div>
                    <div class="aisle-panel-mini"><canvas id="simple-aisle-2"></canvas></div>
                    <div class="aisle-panel-mini"><canvas id="simple-aisle-3"></canvas></div>
                    <div class="aisle-panel-mini"><canvas id="simple-aisle-4"></canvas></div>
                </div>
            </section>

            <!-- Right: Distance Greedy -->
            <section class="algo-column" id="column-greedy">
                <div class="algo-header">
                    <h2>Distance Greedy</h2>
                    <div class="metrics-grid">
                        <div class="metric">
                            <label>Time</label>
                            <span id="greedy-time">—</span>
                        </div>
                        <div class="metric">
                            <label>P/h</label>
                            <span id="greedy-pallets-hour">—</span>
                        </div>
                        <div class="metric">
                            <label>Eff</label>
                            <span id="greedy-efficiency">—</span>
                        </div>
                        <div class="metric">
                            <label>Occ</label>
                            <span id="greedy-occupancy">—</span>
                        </div>
                    </div>
                </div>
                <div class="aisle-grid-mini">
                    <div class="aisle-panel-mini"><canvas id="greedy-aisle-1"></canvas></div>
                    <div class="aisle-panel-mini"><canvas id="greedy-aisle-2"></canvas></div>
                    <div class="aisle-panel-mini"><canvas id="greedy-aisle-3"></canvas></div>
                    <div class="aisle-panel-mini"><canvas id="greedy-aisle-4"></canvas></div>
                </div>
            </section>
        </div>

        <aside class="compact-feed">
            <div id="live-feed" class="feed-log-mini"></div>
        </aside>
    </div>
    <script src="app.js"></script>
</body>
</html>
